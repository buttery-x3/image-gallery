<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="darkreader-lock" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0b0c0e" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="./social-preview.png" />
    <!-- gallery-metadata -->
    <title>__GALLERY_TITLE__</title>
  </head>
  <body>
    <header class="site-header">
      <div class="header-title">
        <h1>__GALLERY_TITLE__</h1>
        <button id="shuffle" class="shuffle-button" type="button" disabled>
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M16 3h5v5" />
            <path d="m21 3-6.5 6.5a4 4 0 0 1-5.7 0L3 3.7" />
            <path d="M16 21h5v-5" />
            <path d="m21 21-6.5-6.5a4 4 0 0 0-5.7 0L3 20.3" />
          </svg>
          <span>Shuffle</span>
        </button>
      </div>
      <div class="header-controls">
        <label class="search-field">
          <span class="visually-hidden">Search images</span>
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7" />
            <path d="m16 16 5 5" />
          </svg>
          <input id="search" type="search" placeholder="Search images" autocomplete="off" />
        </label>
        <label class="searchable-toggle">
          <input id="searchable-only" type="checkbox" checked />
          <span class="toggle-track" aria-hidden="true"><span></span></span>
          <span>Searchable only</span>
        </label>
        <label class="searchable-toggle">
          <input id="favorites-only" type="checkbox" />
          <span class="toggle-track" aria-hidden="true"><span></span></span>
          <span>Only favorites</span>
        </label>
        <fieldset class="name-language" aria-label="Display name language">
          <label>
            <input type="radio" name="name-language" value="en" checked />
            <span>EN</span>
          </label>
          <label>
            <input type="radio" name="name-language" value="ja" />
            <span>JP</span>
          </label>
        </fieldset>
        <button id="advanced-filters" class="advanced-button" type="button" disabled>
          <span>Advanced</span>
          <span id="advanced-filter-count" class="filter-count" hidden></span>
        </button>
      </div>
      <p id="image-count" class="image-count" aria-live="polite"></p>
    </header>
    <main>
      <p id="status" class="status">Loading gallery…</p>
      <section id="gallery" class="gallery" aria-label="Image gallery"></section>
    </main>
    <dialog id="filter-dialog" class="filter-dialog" aria-labelledby="filter-dialog-title">
      <form id="filter-form" class="filter-form">
        <div class="filter-dialog-header">
          <div>
            <h2 id="filter-dialog-title">Advanced filters</h2>
            <p>Choose any combination of metadata tags.</p>
          </div>
          <button id="filter-close" class="filter-close" type="button" aria-label="Close filters">×</button>
        </div>
        <div id="filter-grid" class="filter-grid"></div>
        <div class="filter-actions">
          <button id="filter-reset" class="secondary-button" type="button">Reset</button>
          <button class="primary-button" type="submit">Apply filters</button>
        </div>
      </form>
    </dialog>
    <dialog id="lightbox" class="lightbox" aria-labelledby="lightbox-name">
      <button id="lightbox-close" class="lightbox-close" type="button" aria-label="Close preview">
        <span aria-hidden="true">×</span>
      </button>
      <div class="lightbox-stage">
        <button id="lightbox-previous" class="lightbox-nav" type="button" aria-label="Previous image">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m15 18-6-6 6-6" />
          </svg>
        </button>
        <div class="lightbox-content">
          <p id="lightbox-name" class="lightbox-name"></p>
          <div id="lightbox-media" class="lightbox-media">
            <img id="lightbox-image" class="lightbox-image" alt="" />
            <div id="lightbox-name-overlay" class="lightbox-name-overlay" aria-hidden="true" hidden>
              <span id="lightbox-short-name-en" class="lightbox-short-name-en"></span>
              <span id="lightbox-short-name-ja" class="lightbox-short-name-ja" lang="ja"></span>
            </div>
            <span class="lightbox-watermark" aria-hidden="true">waifu.lol</span>
          </div>
          <div class="lightbox-actions">
            <button id="lightbox-favorite" class="lightbox-action lightbox-favorite" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="m12 2.75 2.85 5.78 6.38.93-4.62 4.5 1.09 6.35-5.7-3-5.7 3 1.09-6.35-4.62-4.5 6.38-.93L12 2.75Z" />
              </svg>
              <span>Add favorite</span>
            </button>
            <button id="lightbox-toggle-name" class="lightbox-action" type="button" aria-pressed="true">
              <span>Hide name</span>
            </button>
            <button id="lightbox-text-position" class="lightbox-action" type="button">
              <span>Text position</span>
            </button>
          </div>
        </div>
        <button id="lightbox-next" class="lightbox-nav" type="button" aria-label="Next image">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m9 6 6 6-6 6" />
          </svg>
        </button>
      </div>
    </dialog>
    <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
